ame: Build and publish sqlite3-maint

on:
  push:
    branches: [ "main" ]
    paths:
      - Containerfile
      - main.go
  pull_request:
    branches: [ "main" ]
    paths:
      - Containerfile
      - main.go
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
 
      - name: Load versions
        run: |
          echo "VERSION=$(yq -r '.sqlite3-maint' versions.yaml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg VERSION=${VERSION} \
            -t ghcr.io/simons-containers/sqlite3-maint:${VERSION} \
            -t ghcr.io/simons-containers/sqlite3-maint:latest \
            --push \
            -f Containerfile .